# GitLab Self-Managed CI/CD Pipeline — Store Frontend (Next.js)
#
# Required CI/CD Variables:
#   VERCEL_TOKEN        — Vercel personal access token
#   VERCEL_ORG_ID       — Vercel org/team ID
#   VERCEL_PROJECT_ID   — Vercel project ID
#   UPTIMEBOLT_API_URL  — e.g. https://api.uptimebolt.io
#   UPTIMEBOLT_API_KEY  — JWT or API key

stages:
  - deploy
  # - notify  # Using webhooks directly instead

deploy_production:
  stage: deploy
  image: node:20-alpine
  environment:
    name: production
    url: https://$CI_PROJECT_NAME.vercel.app
  script:
    - npm install -g vercel
    - vercel pull --yes --environment=production --token=$VERCEL_TOKEN
    - vercel build --prod --token=$VERCEL_TOKEN
    - DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
    - echo "DEPLOY_URL=$DEPLOY_URL" >> deploy.env
    - echo "Deployed to $DEPLOY_URL"
  artifacts:
    reports:
      dotenv: deploy.env
  only:
    - main

