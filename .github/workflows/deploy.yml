# Build & GitOps Deploy
# Builds a multi-arch image (the kind lab runs arm64), pushes it to GHCR and
# bumps the image tag in manifests/deployment.yaml — ArgoCD picks up the
# manifest change and rolls out. The bump commit is [skip ci] + paths-ignore
# guarded so it never re-triggers this workflow.
name: build-and-deploy
on:
  push:
    branches: [main]
    paths-ignore:
      - "manifests/**"
      - "**.md"
      - ".gitlab-ci.yml"
concurrency:
  group: gitops-deploy
  cancel-in-progress: false
permissions:
  contents: write
  packages: write
jobs:
  build-and-bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
      - name: Bump image tag in manifest (GitOps)
        run: |
          sed -i "s|image: ghcr.io/.*|image: ghcr.io/${{ github.repository }}:${{ github.sha }}|" manifests/deployment.yaml
          git config user.name "gitops-bot"
          git config user.email "gitops-bot@users.noreply.github.com"
          git add manifests/deployment.yaml
          git commit -m "chore(gitops): deploy ${GITHUB_SHA::7} [skip ci]"
          git pull --rebase origin main
          git push origin main
