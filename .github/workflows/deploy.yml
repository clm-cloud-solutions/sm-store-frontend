# Build & GitOps Deploy — native multi-arch matrix
# Next.js builds are too slow under QEMU emulation (~25 min), so each arch
# builds NATIVELY on its own runner (ubuntu-24.04-arm is free for public
# repos) and pushes by digest; a merge job stitches the multi-arch manifest
# and bumps manifests/deployment.yaml — ArgoCD picks up the manifest change
# and rolls out. The bump commit is [skip ci] + paths-ignore guarded so it
# never re-triggers this workflow.
name: build-and-deploy
on:
  push:
    branches: [main]
    paths-ignore:
      - "manifests/**"
      - "**.md"
      - ".gitlab-ci.yml"
concurrency:
  group: gitops-deploy
  cancel-in-progress: false
permissions:
  contents: write
  packages: write
env:
  IMAGE: ghcr.io/${{ github.repository }}
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1
  merge-and-bump:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            $(printf "${IMAGE}@sha256:%s " *)
      - name: Bump image tag in manifest (GitOps)
        run: |
          sed -i "s|image: ghcr.io/.*|image: ${{ env.IMAGE }}:${{ github.sha }}|" manifests/deployment.yaml
          git config user.name "gitops-bot"
          git config user.email "gitops-bot@users.noreply.github.com"
          git add manifests/deployment.yaml
          git commit -m "chore(gitops): deploy ${GITHUB_SHA::7} [skip ci]"
          git pull --rebase origin main
          git push origin main
